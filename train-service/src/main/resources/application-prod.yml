server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:5432/railforge_db
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: railforge_schema

  kafka:
    bootstrap-servers: ${KAFKA_HOST}:9092

logging:
  level:
    com.railforge: WARN

internal:secret: ${INTERNAL_SECRET:}