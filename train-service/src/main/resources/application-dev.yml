server:
  port: 8082

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/railforge_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  kafka:
    bootstrap-servers: localhost:9092

logging:
  level:
    com.railforge: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n"

# Internal security
internal:
  secret: railforge-internal-2024