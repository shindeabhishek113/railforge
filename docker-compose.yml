services:
  postgres:
    image: postgres:15
    container_name: railforge_postgres
    environment:
      POSTGRES_DB: railforge_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    networks:
      - railforge-network

  redis:
    image: redis:7-alpine
    container_name: railforge_redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - railforge-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: railforge_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    restart: unless-stopped
    networks:
      - railforge-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: railforge_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
    restart: unless-stopped
    networks:
      - railforge-network

networks:
  railforge-network:
    driver: bridge

volumes:
  postgres_data:
